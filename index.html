<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Assistant</title>
  <meta name="description" content="AI-powered chatbot assistant">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">
      <div class="header-content">
        <div class="header-text">
          <h2>AI Assistant</h2>
          <p>POWERED BY LLM</p>
          <p id="userInfo" style="font-weight: 600; color: #667eea;"></p>
        </div>
        <div class="header-controls">
          <div class="user-menu">
            <button id="userMenuBtn" class="user-menu-btn">
              <span id="userDisplay">User</span>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="6 9 12 15 18 9"></polyline>
              </svg>
            </button>
            <div id="userDropdown" class="dropdown-menu">
              <div class="menu-item stats-item">
                <span>📊 Stats</span>
                <span id="statsText" style="font-size: 0.85em; opacity: 0.7;">Loading...</span>
              </div>
              <hr>
              <button id="clearHistoryBtn" class="menu-item danger">🗑️ Clear History</button>
              <button id="logoutBtn" class="menu-item">🚪 Logout</button>
            </div>
          </div>
          <button id="themeToggle" class="theme-toggle" aria-label="Toggle theme">
          <svg class="sun-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3"/>
            <line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/>
            <line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
          <svg class="moon-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
        </div>
      </div>
    </div>
    <div class="messages" id="messages">
      <div class="message ai">
        👋 Hello! I'm <strong>AI Assistant</strong>, your intelligent assistant. I'm here to help you with:<br><br>
        • Answering questions<br>
        • Explaining concepts<br>
        • Brainstorming ideas<br>
        • Writing assistance<br><br>
        How can I assist you today?
      </div>
    </div>
    <div class="input-area">
      <input type="text" id="userInput" placeholder="Type your message..." autocomplete="off" />
      <button id="sendBtn">
        <span>Send</span>
      </button>
    </div>
  </div>

  <script src="config/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
