<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Assistant — Powered by Llama3</title>
  <meta name="description" content="ChatGPT-like AI Assistant powered by Llama3. Intelligent conversations with cross-session context.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div id="sidebarOverlay" class="sidebar-overlay"></div>

  <!-- SIDEBAR -->
  <aside id="sidebar" class="sidebar">
    <div class="sidebar-top">
      <div class="sidebar-logo">
        <div class="logo-icon-wrap">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
            <path d="M12 22v-5"/>
            <circle cx="12" cy="12" r="3" fill="var(--accent)" fill-opacity="0.2"/>
          </svg>
        </div>
        <span>AI Assistant</span>
      </div>
      <button id="newChatBtn" class="new-chat-btn" title="New conversation">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
      </button>
    </div>

    <div class="sidebar-conversations">
      <div id="conversationList" class="conversation-list"></div>
    </div>

    <div class="sidebar-bottom">
      <div class="sidebar-user-panel" id="sidebarUserPanel">
        <div class="user-avatar-small" id="userAvatarSmall">U</div>
        <span class="sidebar-username" id="sidebarUsername">User</span>
        <button id="sidebarMenuBtn" class="sidebar-menu-icon" title="Options">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/></svg>
        </button>
      </div>
      <div id="sidebarDropdown" class="sidebar-dropdown">
        <button id="clearHistoryBtn" class="sidebar-dd-item danger">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
          Clear chat history
        </button>
        <button id="themeToggleBtn" class="sidebar-dd-item">
          <svg class="sun-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          <svg class="moon-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          <span id="themeLabel">Light mode</span>
        </button>
        <hr class="sidebar-dd-divider">
        <button id="logoutBtn" class="sidebar-dd-item">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Log out
        </button>
      </div>
    </div>
  </aside>

  <!-- MAIN CHAT -->
  <main class="chat-main">
    <header class="chat-topbar">
      <button id="sidebarToggleBtn" class="hamburger-btn" title="Toggle sidebar" aria-label="Toggle sidebar">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="topbar-model-badge">
        <span class="model-dot"></span>
        <span id="modelLabel">Llama3</span>
      </div>
      <button id="themeToggle" class="topbar-theme-btn" aria-label="Toggle theme" title="Toggle theme">
        <svg class="sun-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <svg class="moon-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </header>

    <div class="messages-wrapper" id="messagesWrapper">
      <div class="messages" id="messages">
        <div class="empty-state" id="emptyState">
          <div class="empty-logo">
            <div class="empty-logo-icon">
              <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                <path d="M12 22v-5"/>
                <circle cx="12" cy="12" r="4" fill="var(--accent)" fill-opacity="0.1"/>
                <path d="M12 7l4 2-4 2-4-2 4-2z" fill="var(--accent)" fill-opacity="0.3"/>
              </svg>
            </div>
          </div>
          <h1 class="empty-title">How can I help you today?</h1>
          <div class="suggestion-grid">
            <button class="suggestion-card" data-text="Explain quantum computing in simple terms">
              <span class="suggestion-icon">💡</span>
              <span>Explain quantum computing in simple terms</span>
            </button>
            <button class="suggestion-card" data-text="Write a Python script to rename files in a folder">
              <span class="suggestion-icon">💻</span>
              <span>Write a Python script to rename files</span>
            </button>
            <button class="suggestion-card" data-text="Give me 5 creative ideas for a mobile app">
              <span class="suggestion-icon">🚀</span>
              <span>Give me 5 creative mobile app ideas</span>
            </button>
            <button class="suggestion-card" data-text="How do I improve my writing skills?">
              <span class="suggestion-icon">✍️</span>
              <span>How do I improve my writing skills?</span>
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- INPUT SECTION -->
    <div class="input-section">
      <div class="input-inner">
        <div id="contextChipsBar" class="context-chips-bar"></div>
        <div id="mentionDropdown" class="mention-dropdown">
          <div class="mention-dropdown-header">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M16 8v5a3 3 0 0 0 6 0v-1a10 10 0 1 0-3.92 7.94"/></svg>
            Reference a past conversation
          </div>
          <div id="mentionList" class="mention-list"></div>
        </div>
        <div class="input-box-wrapper">
          <textarea id="userInput" class="chat-textarea" placeholder="Message AI Assistant…  (type @ to add context from another session)" rows="1" autocomplete="off"></textarea>
          <button id="sendBtn" class="send-btn" title="Send message" disabled>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
          </button>
        </div>
        <p class="input-disclaimer">AI Assistant can make mistakes. Consider verifying important information.</p>
      </div>
    </div>
  </main>

  <script src="config/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
